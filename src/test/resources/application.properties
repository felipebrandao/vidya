# -------------------------
# Datasource (H2 in-memory)
# -------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# -------------------------
# Flyway (disabled for tests - DDL managed by Hibernate)
# -------------------------
spring.flyway.enabled=false

# -------------------------
# Seed de dados (carregado apos o DDL do Hibernate)
# -------------------------
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/import.sql
spring.jpa.defer-datasource-initialization=true

# -------------------------
# JWT
# -------------------------
jwt.secret=test-secret-key-for-integration-tests-only-minimum-256-bits
jwt.expiration=86400000

# -------------------------
# Sankhya (not used in tests)
# -------------------------
sankhya.base-url=http://localhost:9999
sankhya.username=test
sankhya.password=test

# -------------------------
# Feign / Cloud
# -------------------------
spring.cloud.openfeign.client.config.default.connect-timeout=1000
spring.cloud.openfeign.client.config.default.read-timeout=1000


