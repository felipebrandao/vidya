spring.application.name=vidya

# -------------------------
# Datasource (PostgreSQL)
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# -------------------------
# Flyway
# -------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# -------------------------
# JWT
# -------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# -------------------------
# Sankhya
# -------------------------
sankhya.base-url=${SANKHYA_BASE_URL}
sankhya.username=${SANKHYA_USERNAME}
sankhya.password=${SANKHYA_PASSWORD}

# -------------------------
# Feign Clients
# -------------------------
spring.cloud.openfeign.client.config.default.connect-timeout=10000
spring.cloud.openfeign.client.config.default.read-timeout=30000
spring.cloud.openfeign.client.config.default.logger-level=basic

# -------------------------
# Actuator
# -------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# -------------------------
# Springdoc / Swagger
# -------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# -------------------------
# Logging
# -------------------------
logging.level.br.com.felipebrandao.vidya=DEBUG
logging.level.org.flywaydb=INFO
